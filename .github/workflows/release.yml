name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --verbose

      - name: Build release binary
        run: cargo build --release

      - name: Build menu bar app
        run: bash menubar/build.sh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.VERSION }}" menubar/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.VERSION }}" menubar/RustyBackMenu.app/Contents/Info.plist

      - name: Build installer package
        run: |
          bash build-pkg.sh
          mv "RustyMacBackup-${{ steps.version.outputs.VERSION }}.pkg" \
             "RustyMacBackup-${{ steps.version.outputs.VERSION }}-arm64.pkg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            RustyMacBackup-${{ steps.version.outputs.VERSION }}-arm64.pkg
            target/release/rustyback
