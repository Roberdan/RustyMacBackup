name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: ./run-tests.sh

      - name: Build + package (pkg + app.zip)
        run: VERSION="${{ steps.version.outputs.VERSION }}" bash build-pkg.sh

      - name: Verify artifacts
        run: |
          VER="${{ steps.version.outputs.VERSION }}"
          test -f "RustyMacBackup-${VER}-arm64.pkg" || { echo "❌ pkg missing"; exit 1; }
          test -f "RustyMacBackup-${VER}.app.zip"    || { echo "❌ app.zip missing"; exit 1; }
          echo "✅ pkg:     $(du -sh RustyMacBackup-${VER}-arm64.pkg | cut -f1)"
          echo "✅ app.zip: $(du -sh RustyMacBackup-${VER}.app.zip | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            RustyMacBackup-${{ steps.version.outputs.VERSION }}-arm64.pkg
            RustyMacBackup-${{ steps.version.outputs.VERSION }}.app.zip

