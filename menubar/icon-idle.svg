  <path d="M9 1C6.5 1 3.5 2 2 3.5V9c0 4 3.2 6.8 7 8 3.8-1.2 7-4 7-8V3.5C14.5 2 11.5 1 9 1z" 
        fill="black" fill-opacity="0.85"/>
  <!-- Inner drive/disk symbol -->
  <rect x="5" y="6" width="8" height="5" rx="1" fill="white"/>
  <circle cx="11.5" cy="8.5" r="0.8" fill="black"/>
  <rect x="5.8" y="7" width="4" height="0.8" rx="0.4" fill="black" opacity="0.4"/>
  <!-- Checkmark -->
  <polyline points="6.5,12.5 8,14 11.5,10.5" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
